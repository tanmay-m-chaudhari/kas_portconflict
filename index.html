<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Enhanced Webpage</title>
    <style>
        /* A little bit of CSS to make it look clean */
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 20px; color: #333; }
        header { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        nav a { margin-right: 15px; text-decoration: none; color: blue; }
        main { margin: 20px 0; }
        footer { font-size: 0.8em; color: #777; margin-top: 50px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Site</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>About This Project</h2>
            <p>This is an expanded HTML5 boilerplate. It includes a header, a navigation menu, and a main content section.</p>
        </section>

        <section>
            <h2>Interactivity</h2>
            <button id="myButton">Click Me!</button>
            <p id="message"></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Awesome Website</p>
    </footer>

    <script>
        const btn = document.getElementById('myButton');
        const msg = document.getElementById('message');

        btn.addEventListener('click', () => {
            msg.textContent = "You clicked the button! The script is working.";
            btn.style.backgroundColor = "lightgreen";
        });
    </script>

</body>
</html>
